<html>
<head>
    <title>Dj deck</title>
    <style>
          body {
            background-color: #1e1e24;
            color: #ffffff;
            padding: 50px;
          }
          input[type="range"] {
    width: 130px;
    cursor: pointer;
}
          .dek {
            background-color: #2b2b36;
            border: 3px solid #00ffff;
            border-radius: 19px;
            padding: 90px;
            width: 180px;
            text-align: center;
        }
        .slider{
 margin-top: 20px;
            font-size: 14px;
        }
        button {
            width: 50%;
            padding: 20px;
            margin-top: 20px;
            background-color: #00ffff;
            color: #1e1e24;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
    </style>
      
</head>
<body>
    <div class="dek">
        <h2>My dj deck</h2>
      <select id="songSelector">
        <option value="">-- Select a Song --</option>
        <option value="6590745674383360.wav">Track 1</option>
        <option value = "5458802178129920.wav">Track 2</option>
        <option value = "5695671805542400.wav
">Track 3</option>
      </select>
      <button id="playButton">PLAY</button>
<div class = "slider">
    <label >Pitch/Speed:</label>
           <input type="range" id="Slide" min="0.5" max="1.5" step="0.1" value="1">
</div>
<audio id="audioEngine" crossorigin="anonymous"loop></audio>
<div class="slider">
    <label>Volume:</label>
<input type="range"  id="vol" min="0"max="1"step="0.05" value="0.8">
    </div>  
    <div class="slider">
    <label>Bass (Low):</label>
    <input type="range" id="b"
min="-20" max="20" step="1" value="0">
</div>
<div class="slider">
    <label>Treble (High):</label>
    <input type="range" id="t" min="-20" max="20" step="1" value="0">
</div>
</div>
    </div>

<script>
    const selector =document.getElementById('songSelector');
    const audio =document.getElementById('audioEngine');
    const  playBtn = document.getElementById('playButton');
    const volumeSlider = document.getElementById('vol');
    const bassSlider = document.getElementById('b');
    const   trebleSlider = document.getElementById('t');
    let audioContext;
let bassFilter;
let trebleFilter;
    const speedSlider = document.getElementById('Slide');
     selector.addEventListener('change', function() {
audio.src = selector.value
audio.load();  playBtn.innerText = "PLAY"; 

     
     });
    


        playBtn.addEventListener('click', function() {
        if (!audio.src) {
            alert("Pick a track from the menu first!");
            return; 
        } 
          setupAudioNodes();
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
    if (audio.paused){
        audio.play();
         playBtn.innerText = "PAUSE"; 
    }else{
         audio.pause();
            playBtn.innerText = "PLAY";
    }
     });

        
speedSlider.addEventListener('input', function() {
    audio.playbackRate = speedSlider.value; 
});


function setupAudioNodes() {
    if (audioContext) return; 

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaElementSource(audio);

    bassFilter = audioContext.createBiquadFilter();
        bassFilter.type = 'lowshelf';
    bassFilter.frequency.value = 200; 
    trebleFilter = audioContext.createBiquadFilter();
    trebleFilter.type = 'highshelf';
    trebleFilter.frequency.value = 3000;

    source.connect(bassFilter);
    bassFilter.connect(trebleFilter);
    trebleFilter.connect(audioContext.destination);
};
volumeSlider.addEventListener('input', function() {
    audio.volume = volumeSlider.value;
});

bassSlider.addEventListener('input', function() {
    if (bassFilter) {
        bassFilter.gain.value = bassSlider.value;

    }});

    trebleSlider.addEventListener('input', function() {
    if (trebleFilter) {
        trebleFilter.gain.value = trebleSlider.value;
    }
});

</script>
</body>
</html>
