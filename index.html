<html>
    <center>
<head>
    <title>Dj deck</title>
    <style>
          body {
            background-color: #1e1e24;
            color: #ffffff;
            padding: 50px;
            
            margin: 0;

          }
          input[type="range"] {
    width: 130px;
    cursor: pointer;
          }
          .spn{
        border-radius: 50%;
    height: 140px;
        width: 140px;
        background: radial-gradient(circle, #00ffff 6%, #111115 7%, #1a1a22 8%, #111115 15%, #22222b 16%, #050508 70%); /*I copy and pasted this line right here!!! It looked pretty on someone else's project so I borrowed this single line.*/
    margin: 20px auto;
    position: relative;
    animation: spinAnimation 3s linear infinite;
    animation-play-state: paused;

          }
          .spn::after {
    content: '';
    position: absolute;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    width: 8px;
    height: 8px;
    background-color: #00ffff;
    border-radius: 50%;
    box-shadow: 0 0 6px #00ffff;


}
          .dek {

            background-color: #2b2b36;
            border: 3px solid #00ffff;
            border-radius: 19px;
            padding: 90px;
            width: 180px;
            text-align: center;
        }
        .slider{
 margin-top: 20px;
            font-size: 14px;
        }
        button {
            width: 50%;
            padding: 20px;
            margin-top: 20px;
            background-color: #00ffff;
            color: #1e1e24;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }
          .opensesameseeds {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #1e1e24;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            animation: fadeOutEffect 3s ease-in-out forwards;
        }

        .opensesameseeds img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes spinAnimation {
    100% {
        transform: rotate(360deg);
    }
}
        @keyframes fadeOutEffect {
            0% {
                opacity: 1;
                visibility: visible;
            }
            70% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }
    </style>
      
</head>
<body>
    <div class="opensesameseeds">
        <img src = "djplayachristmassong.png">

    </div>
    <div class="dek">
        <h2>My dj deck</h2> <div class="spn"></div>

      <select id="songSelector">
        <option value="">-- Select a Song --</option>
        <option value="6590745674383360.wav">Track 1</option>
        <option value = "5458802178129920.wav">Track 2</option>
        <option value = "5695671805542400.wav
">Track 3</option>
<option value = "5791464071757824.wav
">Track 4</option>
<option value = "5560378792214528.wav
">Track 5</option>

      </select>
      <button id="playButton">PLAY</button>
<div class = "slider">
    <label >Pitch/Speed:</label>
           <input type="range" id="Slide" min="0.5" max="1.5" step="0.1" value="1">
</div>
<audio id="audioEngine" crossorigin="anonymous"loop></audio>
<div class="slider">
    <label>Volume:</label>
<input type="range"  id="vol" min="0"max="1"step="0.05" value="0.8">
    </div>  
    <div class="slider">
    <label>Bass (Low):</label>
    <input type="range" id="b"
min="-20" max="20" step="1" value="0">
</div>
<div class="slider">
    <label>Treble (High):</label>
    <input type="range" id="t" min="-20" max="20" step="1" value="0">
</div>
</div>
    </div>

<script>
    const selector =document.getElementById('songSelector');
    const audio =document.getElementById('audioEngine');
    const  playBtn = document.getElementById('playButton');
    const volumeSlider = document.getElementById('vol');
    const bassSlider = document.getElementById('b');
    const   trebleSlider = document.getElementById('t');
    let audioContext;
let bassFilter;
let trebleFilter;
    const speedSlider = document.getElementById('Slide');
    const spn = document.querySelector('.spn');

     selector.addEventListener('change', function() {
audio.src = selector.value;
audio.load();  playBtn.innerText = "PLAY"; spn.style.animationPlayState = "paused";

     
     });
    


        playBtn.addEventListener('click', function() {
        if (!audio.src) {
            alert("Pick a track from the menu first!");
            return; 
        } 
          setupAudioNodes();
    if (audioContext.state === 'suspended') {
        audioContext.resume();
    }
    if (audio.paused){
        audio.play();
        playBtn.innerText = "PAUSE"; 
        spn.style.animationPlayState = "running";
    }else{
         audio.pause();
            playBtn.innerText = "PLAY";
             spn.style.animationPlayState = "paused";
    }
     });

        
speedSlider.addEventListener('input', function() {
    audio.playbackRate = speedSlider.value; 
});


function setupAudioNodes() {
    if (audioContext) return; 

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    const source = audioContext.createMediaElementSource(audio);

    bassFilter = audioContext.createBiquadFilter();
        bassFilter.type = 'lowshelf';
    bassFilter.frequency.value = 200; 
    trebleFilter = audioContext.createBiquadFilter();
    trebleFilter.type = 'highshelf';
    trebleFilter.frequency.value = 3000;

    source.connect(bassFilter);
    bassFilter.connect(trebleFilter);
    trebleFilter.connect(audioContext.destination);
};
volumeSlider.addEventListener('input', function() {
    audio.volume = volumeSlider.value;
});

bassSlider.addEventListener('input', function() {
    if (bassFilter) {
        bassFilter.gain.value = bassSlider.value;

    }});

    trebleSlider.addEventListener('input', function() {
    if (trebleFilter) {
        trebleFilter.gain.value = trebleSlider.value;
    }
});

</script>
</body>
</center>
</html>
